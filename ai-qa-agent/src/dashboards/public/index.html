<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI QA Agent — Observability Dashboard</title>
  <link rel="stylesheet" href="/dashboard/public/styles.css" />
</head>
<body>
  <header>
    <h1>AI QA Agent — Observability Dashboard</h1>
    <p id="error-banner" class="error-banner hidden" role="alert">
      <!-- populated by JS when a data fetch fails (Requirement 13.4) -->
    </p>
  </header>

  <main>
    <!-- Session list (Requirement 13.1) -->
    <section id="sessions-section">
      <h2>Sessions</h2>
      <table id="sessions-table" aria-label="Session list">
        <thead>
          <tr>
            <th scope="col">Session ID</th>
            <th scope="col">Status</th>
            <th scope="col">Started At</th>
            <th scope="col">Duration (ms)</th>
            <th scope="col">Result</th>
          </tr>
        </thead>
        <tbody id="sessions-tbody">
          <tr><td colspan="5">Loading…</td></tr>
        </tbody>
      </table>
    </section>

    <!-- Per-session drill-down (Requirement 13.2 / 13.3) -->
    <section id="drilldown-section" class="hidden">
      <h2>Session Detail — <span id="drilldown-session-id"></span></h2>
      <div id="drilldown-content">
        <!-- populated by charts.js on row click -->
      </div>
    </section>

    <!-- Metric charts (Requirements 13.5 / 13.6 / 13.7) -->
    <section id="charts-section">
      <h2>Metrics</h2>
      <div class="chart-grid">
        <div>
          <h3>Task Success Rate &amp; Failure Rate (last 90 days)</h3>
          <canvas id="chart-success-failure" aria-label="Success and failure rate chart"></canvas>
        </div>
        <div>
          <h3>Average Latency per Agent (last 90 days)</h3>
          <canvas id="chart-latency" aria-label="Average latency chart"></canvas>
        </div>
        <div>
          <h3>Hallucination Rate &amp; Tool Accuracy (rolling 30 sessions)</h3>
          <canvas id="chart-hallucination-accuracy" aria-label="Hallucination and accuracy chart"></canvas>
        </div>
      </div>
    </section>
  </main>

  <!-- Chart.js loaded from CDN — replaced with bundled version before prod -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
  <script src="/dashboard/public/charts.js" type="module"></script>
</body>
</html>
