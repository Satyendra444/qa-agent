<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI QA Agent — Observability Dashboard</title>
  <link rel="stylesheet" href="/dashboard/public/styles.css" />
</head>
<body>
  <header>
    <h1>AI QA Agent — Observability Dashboard</h1>
    <p id="error-banner" class="error-banner hidden" role="alert">
      <!-- populated by JS when a data fetch fails (Requirement 13.4) -->
    </p>
  </header>

  <main>
    <section id="filters-section">
      <h2>Filters</h2>
      <form id="dashboard-filters" class="filters-form">
        <label>
          Status
          <select id="filter-status">
            <option value="">All</option>
            <option value="pending">Pending</option>
            <option value="running">Running</option>
            <option value="completed">Completed</option>
            <option value="failed">Failed</option>
          </select>
        </label>
        <label>
          Agent
          <input id="filter-agent" type="text" placeholder="Agent name" />
        </label>
        <label>
          Tool
          <input id="filter-tool" type="text" placeholder="Tool name" />
        </label>
        <label>
          From
          <input id="filter-from" type="date" />
        </label>
        <label>
          To
          <input id="filter-to" type="date" />
        </label>
        <button type="submit">Apply</button>
      </form>
    </section>

    <section id="sessions-section">
      <h2>Sessions</h2>
      <table id="sessions-table" aria-label="Session list">
        <thead>
          <tr>
            <th scope="col">Session ID</th>
            <th scope="col">Status</th>
            <th scope="col">Started At</th>
            <th scope="col">Duration</th>
            <th scope="col">Result</th>
          </tr>
        </thead>
        <tbody id="sessions-tbody">
          <tr><td colspan="5">Loading…</td></tr>
        </tbody>
      </table>
    </section>

    <section id="drilldown-section" class="hidden">
      <h2>Session Detail — <span id="drilldown-session-id"></span></h2>
      <div id="drilldown-content"></div>
    </section>

    <section id="charts-section">
      <h2>Metrics</h2>
      <div class="chart-grid">
        <div>
          <h3>Success vs Failure</h3>
          <canvas id="chart-success-failure" aria-label="Success and failure rate chart"></canvas>
        </div>
        <div>
          <h3>Latency and Cost</h3>
          <canvas id="chart-latency" aria-label="Latency and cost chart"></canvas>
        </div>
        <div>
          <h3>Tokens and Agent Activity</h3>
          <canvas id="chart-tokens" aria-label="Token usage chart"></canvas>
        </div>
      </div>
    </section>
  </main>

  <!-- Chart.js loaded from CDN — replaced with bundled version before prod -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
  <script src="/dashboard/public/charts.js" type="module"></script>
</body>
</html>
