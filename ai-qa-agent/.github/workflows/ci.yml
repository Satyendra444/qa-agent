name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ── Quality gate — type check, lint, format, unit tests + coverage ──────────
  quality:
    name: Quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npm run typecheck

      - name: ESLint
        run: npm run lint

      - name: Prettier format check
        run: npm run format:check

      - name: Unit tests with coverage
        run: npm run test:unit:coverage

      - name: Upload unit coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-coverage
          path: coverage/unit/
          retention-days: 30

  # ── Integration tests — requires Docker Compose services ───────────────────
  integration:
    name: Integration
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Start Docker Compose test services
        run: |
          docker compose -f docker-compose.test.yml up -d --wait
          # Wait up to 60 s for all health checks to pass
          timeout 60 bash -c \
            "until docker compose -f docker-compose.test.yml ps --format json | \
             grep -v '\"Health\":\"healthy\"' | grep -v '\"Health\":\"\"' | \
             wc -l | grep -q '^0$'; do sleep 2; done"

      - name: Run integration tests
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5433/qa_agent_test
          PLAYWRIGHT_MCP_URL: http://localhost:5170
          POSTGRES_MCP_URL: http://localhost:5173
          GITHUB_MCP_URL: http://localhost:5174
        run: npm run test:integration

      - name: Upload integration coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-coverage
          path: coverage/integration/
          retention-days: 30

      - name: Stop Docker Compose test services
        if: always()
        run: docker compose -f docker-compose.test.yml down -v
