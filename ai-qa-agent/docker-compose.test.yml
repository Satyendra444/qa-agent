version: "3.9"

# Test-only Compose override — used by the CI integration job.
# Starts only the infrastructure services (no app container).
# Usage: docker-compose -f docker-compose.yml -f docker-compose.test.yml up -d

networks:
  qa-net:
    driver: bridge

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: qa_agent_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 3s
      retries: 20
    networks: [qa-net]

  playwright-mcp:
    image: mcr.microsoft.com/playwright:v1.50.0-jammy
    command: npx @playwright/mcp@latest --port 5170
    ports:
      - "5170:5170"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5170/health || exit 1"]
      interval: 3s
      timeout: 3s
      retries: 20
    networks: [qa-net]

  filesystem-mcp:
    image: node:20-alpine
    command: npx --yes @modelcontextprotocol/server-filesystem@latest /workspace
    volumes:
      - /tmp/qa-test-workspace:/workspace
    ports:
      - "5171:5171"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5171/health || exit 1"]
      interval: 3s
      timeout: 3s
      retries: 20
    networks: [qa-net]

  postgres-mcp:
    image: node:20-alpine
    environment:
      PG_CONNECTION_STRING: postgresql://postgres:password@postgres:5432/qa_agent_test
    command: npx --yes @modelcontextprotocol/server-postgres@latest
    ports:
      - "5173:5173"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5173/health || exit 1"]
      interval: 3s
      timeout: 3s
      retries: 20
    networks: [qa-net]

  github-mcp:
    image: node:20-alpine
    environment:
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
    command: npx --yes @modelcontextprotocol/server-github@latest
    ports:
      - "5174:5174"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5174/health || exit 1"]
      interval: 3s
      timeout: 3s
      retries: 20
    networks: [qa-net]
